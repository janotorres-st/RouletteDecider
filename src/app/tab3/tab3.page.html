<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>👤 Mi Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Mi Perfil</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="perfil-card ion-text-center ion-padding">
    
    <div class="avatar-container" style="display: flex; justify-content: center; margin-bottom: 10px;">
      <ion-avatar style="width: 110px; height: 110px; border: 3px solid var(--ion-color-primary);">
        <img [src]="fotoPerfil" alt="Avatar de usuario" />
      </ion-avatar>
    </div>

    <ion-button size="small" fill="clear" color="secondary" (click)="tomarFoto()">
      <ion-icon name="camera-outline" slot="start"></ion-icon>
      Cambiar Foto
    </ion-button>

    <h2 style="font-weight: 700; margin-top: 10px; margin-bottom: 4px;">Desarrollador Indeciso</h2>
    <p style="color: var(--ion-color-medium); margin-top: 0; font-size: 14px;">user@roulettedecider.com</p>
    
    <ion-grid class="ion-no-padding ion-margin-top" style="border-top: 1px solid #e0e0e0; padding-top: 10px;">
      <ion-row>
        <ion-col size="6" style="border-right: 1px solid #e0e0e0;">
          <h3 style="margin: 0; font-weight: 700; color: var(--ion-color-primary);">42</h3>
          <small style="color: var(--ion-color-medium);">Giros Totales</small>
        </ion-col>
        <ion-col size="6">
          <h3 style="margin: 0; font-weight: 700; color: var(--ion-color-success);">12</h3>
          <small style="color: var(--ion-color-medium);">Ruletas Creadas</small>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <ion-list lines="inset" class="ion-margin-top">
    
    <ion-item button detail="true">
      <ion-icon name="stats-chart-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Historial de Decisiones</ion-label>
    </ion-item>

    <ion-item button detail="true" href="/sugerencias">
      <ion-icon name="chatbubble-ellipses-outline" slot="start" color="secondary"></ion-icon>
      <ion-label>Enviar Sugerencias / Feedback</ion-label>
    </ion-item>

    <ion-item button detail="true">
      <ion-icon name="shield-checkmark-outline" slot="start" color="success"></ion-icon>
      <ion-label>Políticas de Privacidad</ion-label>
    </ion-item>

  </ion-list>

  <div class="ion-padding-horizontal" style="margin-top: 40px;">
    <ion-button expand="block" color="danger" fill="outline" href="/login" onclick="localStorage.removeItem('user_authenticated')">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Cerrar Sesión
    </ion-button>
  </div>

</ion-content>
